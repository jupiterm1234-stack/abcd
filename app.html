<div class="container">

  <h1>Student Registration Form</h1>

  <form [formGroup]="studentForm" (ngSubmit)="onSubmit()">

    <!-- Name -->
    <div class="form-group">

      <label>Name</label>

      <input
        type="text"
        formControlName="name"
        placeholder="Enter your name">

      <div class="error"
        *ngIf="studentForm.get('name')?.touched &&
               studentForm.get('name')?.invalid">

        <small *ngIf="studentForm.get('name')?.errors?.['required']">
          Name is required
        </small>

        <small *ngIf="studentForm.get('name')?.errors?.['minlength']">
          Minimum 3 characters required
        </small>

      </div>
    </div>

    <!-- Email -->
    <div class="form-group">

      <label>Email</label>

      <input
        type="email"
        formControlName="email"
        placeholder="Enter your email">

      <div class="error"
        *ngIf="studentForm.get('email')?.touched &&
               studentForm.get('email')?.invalid">

        <small *ngIf="studentForm.get('email')?.errors?.['required']">
          Email is required
        </small>

        <small *ngIf="studentForm.get('email')?.errors?.['email']">
          Invalid email format
        </small>

      </div>
    </div>

    <!-- Age -->
    <div class="form-group">

      <label>Age</label>

      <input
        type="number"
        formControlName="age"
        placeholder="Enter age">

      <div class="error"
        *ngIf="studentForm.get('age')?.touched &&
               studentForm.get('age')?.invalid">

        <small *ngIf="studentForm.get('age')?.errors?.['required']">
          Age is required
        </small>

        <small *ngIf="studentForm.get('age')?.errors?.['invalidAge']">
          Age must be 18 or above
        </small>

      </div>
    </div>

    <!-- Password -->
    <div class="form-group">

      <label>Password</label>

      <input
        type="password"
        formControlName="password"
        placeholder="Enter password">

      <div class="error"
        *ngIf="studentForm.get('password')?.touched &&
               studentForm.get('password')?.invalid">

        <small *ngIf="studentForm.get('password')?.errors?.['required']">
          Password is required
        </small>

        <small *ngIf="studentForm.get('password')?.errors?.['invalidPassword']">
          Password must contain:
          1 uppercase, 1 number, 1 special character
        </small>

      </div>
    </div>

    <button type="submit">
      Submit
    </button>

  </form>
</div>
